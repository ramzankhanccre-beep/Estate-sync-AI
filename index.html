
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstateSync AI - Real Estate Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Workaround for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This can happen if a library tries to polyfill fetch but window.fetch is read-only.
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Something tried to overwrite window.fetch. This was prevented.'); },
              configurable: true
            });
          }
        } catch (e) {
          console.warn('Could not protect window.fetch:', e);
        }
      })();
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
